// helpers
function normalize(s) {
  return s.toLowerCase().replace(/\s+/g, " ").trim();
}

function levenshtein(a, b) {
  const dp = Array.from({ length: a.length + 1 }, () =>
    Array(b.length + 1).fill(0)
  );
  for (let i = 0; i <= a.length; i++) dp[i][0] = i;
  for (let j = 0; j <= b.length; j++) dp[0][j] = j;

  for (let i = 1; i <= a.length; i++) {
    for (let j = 1; j <= b.length; j++) {
      const cost = a[i - 1] === b[j - 1] ? 0 : 1;
      dp[i][j] = Math.min(
        dp[i - 1][j] + 1,
        dp[i][j - 1] + 1,
        dp[i - 1][j - 1] + cost
      );
    }
  }
  return dp[a.length][b.length];
}

function similarity(a, b) {
  return 1 - levenshtein(a, b) / Math.max(a.length, b.length);
}

// live search
const input = document.getElementById("nameInput");
const suggestions = document.getElementById("suggestions");
const result = document.getElementById("result");

input.addEventListener("input", () => {
  const value = normalize(input.value);
  if (!value) return suggestions.innerHTML = "";

  const scored = people.map(p => {
    let score = similarity(value, normalize(p.name));
    if (p.name.toLowerCase().includes(value)) score += 0.2;
    return { ...p, score };
  });

  scored.sort((a,b) => b.score - a.score);

  suggestions.innerHTML = scored.slice(0,5).map(p => `
    <div class="item" onclick="selectPerson('${p.name}', '${p.seat}')">
      ${p.name}
    </div>
  `).join("");
});

function selectPerson(name, seat) {
  suggestions.innerHTML = "";
  result.innerHTML = `

      <div>${name}</div>
      <div class="seat">${seat}</div>
    </div>
  `;
}
